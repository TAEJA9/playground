<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Playground</title>
<link rel="icon" type="image/png" href="favicon.png" />

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          carbon: '#1d1d1f',
          frost: '#f5f5f7',
          smoke: '#333333',
          graphite: '#474747',
          ash: '#707070',
          mist: '#858585',
          pebble: '#e2e2e5',
          applegreen: '#10b981', // Vibrant emerald green
          linkgreen: '#059669',  // Rich green for links
        },
        fontFamily: {
          sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
        }
      }
    }
  }
</script>

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css" />

<style>
  html, body {
    box-sizing: border-box;
    background-color: #f5f5f7;
    color: #1d1d1f;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  *, *::before, *::after { box-sizing: inherit; }

  /* Apple-style negative tracking for display headers */
  .tracking-tight-apple {
    letter-spacing: -0.015em;
  }

  /* Liquid Drift Background Blob Animations */
  @keyframes liquid-drift-slow {
    0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translate(0, 0) scale(1) rotate(0deg); }
    50% { border-radius: 30% 60% 70% 30% / 50% 60% 30% 70%; transform: translate(40px, -60px) scale(1.15) rotate(180deg); }
  }
  @keyframes liquid-drift-medium {
    0%, 100% { border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%; transform: translate(0, 0) scale(1) rotate(0deg); }
    50% { border-radius: 40% 60% 60% 40% / 60% 40% 40% 60%; transform: translate(-40px, 40px) scale(0.9) rotate(-120deg); }
  }
  @keyframes liquid-drift-fast {
    0%, 100% { border-radius: 40% 60% 50% 50% / 50% 40% 60% 50%; transform: translate(0, 0) scale(1) rotate(0deg); }
    50% { border-radius: 60% 40% 40% 60% / 40% 50% 50% 60%; transform: translate(30px, 30px) scale(1.05) rotate(90deg); }
  }

  .animate-liquid-slow {
    animation: liquid-drift-slow 25s infinite alternate ease-in-out;
  }
  .animate-liquid-medium {
    animation: liquid-drift-medium 20s infinite alternate ease-in-out;
  }
  .animate-liquid-fast {
    animation: liquid-drift-fast 15s infinite alternate ease-in-out;
  }

  /* Liquid Glass Card Styling */
  .card-hover {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.02);
    position: relative;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background 0.3s ease, border-color 0.3s ease, box-shadow 0.4s ease;
  }

  .card-hover:hover {
    transform: translateY(-6px);
    background: rgba(255, 255, 255, 0.65);
    border-color: rgba(16, 185, 129, 0.45); /* Highlight with green outline */
    box-shadow: 0 20px 35px rgba(16, 185, 129, 0.06);
  }

  /* Glassy Shine Sweep Effect */
  .card-hover::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      to right,
      rgba(255, 255, 255, 0) 0%,
      rgba(255, 255, 255, 0.45) 50%,
      rgba(255, 255, 255, 0) 100%
    );
    transform: skewX(-25deg);
    transition: left 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .card-hover:hover::after {
    left: 150%;
  }

  /* Custom Category Button Active State (Using !important to solve Tailwind conflicts) */
  .btn-cat.active {
    background-color: #10b981 !important; /* Green background */
    color: #ffffff !important;
    border-color: #10b981 !important;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
  }
  .btn-cat.active span {
    color: rgba(255, 255, 255, 0.75) !important;
  }

  .card-disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
</style>
</head>
<body class="min-h-screen font-sans bg-frost text-carbon selection:bg-applegreen/20 selection:text-linkgreen">

  <!-- Floating Liquid Green Backdrop Blobs -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden bg-frost">
    <div class="absolute -top-[10%] -right-[10%] w-[55vw] h-[55vh] rounded-full bg-gradient-to-br from-emerald-300/30 to-teal-200/30 blur-[80px] animate-liquid-slow"></div>
    <div class="absolute top-[35%] -left-[10%] w-[50vw] h-[50vh] rounded-full bg-gradient-to-tr from-lime-200/30 to-emerald-200/30 blur-[90px] animate-liquid-medium"></div>
    <div class="absolute -bottom-[10%] right-[15%] w-[45vw] h-[45vh] rounded-full bg-gradient-to-br from-teal-200/25 to-emerald-300/25 blur-[80px] animate-liquid-fast"></div>
  </div>

  <div class="relative z-10">
    <!-- Main Container -->
    <div class="max-w-6xl mx-auto px-6 py-16 md:py-24">
      
      <!-- Typographic Header Block (Apple style) -->
      <header class="text-center mb-16 md:mb-20 max-w-3xl mx-auto">
        <h1 class="text-5xl md:text-6xl font-bold tracking-tight-apple text-carbon mb-6">
          AI Playground
        </h1>
        <p class="text-lg md:text-xl font-light text-ash leading-relaxed mb-3">
          AI 실험실에 오신 것을 환영합니다.
        </p>
        <p class="text-xs text-mist">
          이곳의 기능들은 소리소문 없이 나타났다 사라질 수 있습니다. 🌬️
        </p>
      </header>

      <!-- Apple-style Filter and Search Section (Glassy Surface) -->
      <section class="mb-10">
        <div class="flex flex-col gap-6 bg-white/45 border border-white/60 rounded-2xl p-6 md:p-8 shadow-sm backdrop-blur-xl">
          <!-- Search input -->
          <div class="w-full">
            <div class="relative">
              <input id="searchInput" type="text" placeholder="도구 이름, 설명, 제작자 검색..."
                class="w-full rounded-xl bg-[#f5f5f7]/60 border border-white/50 px-5 py-4 pl-12 text-carbon placeholder:text-mist focus:outline-none focus:ring-2 focus:ring-applegreen focus:bg-white transition-all text-sm md:text-base" />
              <!-- Green Search Icon -->
              <svg class="w-5 h-5 text-linkgreen absolute left-4 top-1/2 -translate-y-1/2" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z"/>
              </svg>
            </div>
          </div>

          <!-- Divider line -->
          <div class="h-[1px] bg-white/50 w-full"></div>

          <!-- Categories & Page Size -->
          <div class="flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between">
            <!-- Category buttons (rendered dynamically) -->
            <div id="catBar" class="flex flex-wrap gap-2"></div>

            <!-- Page Size Selector -->
            <div class="flex items-center gap-3 shrink-0 self-end sm:self-auto">
              <label class="flex items-center gap-2 text-xs font-semibold text-ash">
                페이지당 개수
                <select id="pageSize" class="rounded-lg bg-[#f5f5f7]/60 border border-white/50 px-3 py-1.5 text-carbon text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-applegreen focus:bg-white">
                  <option value="6">6</option>
                  <option value="9" selected>9</option>
                  <option value="12">12</option>
                  <option value="18">18</option>
                </select>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Card Grid Section -->
      <section class="mt-8">
        <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch"></div>
        
        <!-- Pagination -->
        <div id="pager" class="mt-12 flex items-center justify-center gap-2"></div>
      </section>

      <!-- Footer -->
      <footer class="mt-20 md:mt-28 pt-8 border-t border-white/40 text-center text-xs text-mist">
        <p>© Jeongyeon. 2026 · All Rights Reserved.</p>
      </footer>
    </div>
  </div>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
